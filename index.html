<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurye PRO v27</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --accent-color: #2563eb;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --whatsapp: #25d366;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-primary); padding: 12px; padding-bottom: 50px; }
        .container { max-width: 480px; margin: 0 auto; }

        .nav-bar { display: flex; background: var(--card-bg); border-radius: 25px; padding: 8px; margin-bottom: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); gap: 5px; position: sticky; top: 10px; z-index: 1000; }
        .nav-btn { flex: 1; padding: 10px 2px; border: none; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 10px; cursor: pointer; border-radius: 18px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { background: var(--accent-color); color: white; }

        .page { display: none; animation: slideUp 0.3s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border-radius: 28px; padding: 22px; border: 1px solid var(--border); margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .input-group label { font-size: 0.7rem; font-weight: 800; color: var(--accent-color); text-transform: uppercase; margin-left: 4px; }
        input { background: #f8fafc; border: 2px solid #f1f5f9; padding: 14px; border-radius: 16px; font-size: 1rem; font-weight: 700; outline: none; width: 100%; }

        .progress-container { width: 100%; height: 14px; background: #e2e8f0; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); width: 0%; transition: width 0.5s ease; }

        .smart-card { background: white; border-radius: 28px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); }
        .sc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .sc-box { background: #f8fafc; padding: 10px 2px; border-radius: 16px; text-align: center; }
        .sc-box span { font-size: 0.6rem; color: var(--text-secondary); font-weight: 800; display: block; }
        .sc-box strong { font-size: 0.85rem; }

        .report-hero { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); color: white; border-radius: 35px; padding: 25px 20px; text-align: center; margin-bottom: 20px; }
        
        .btn { width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-save { background: var(--accent-color); color: white; }
        .btn-wa { background: var(--whatsapp); color: white; }

        .target-info { background: #eff6ff; padding: 15px; border-radius: 20px; font-size: 0.85rem; color: #1e40af; line-height: 1.4; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <button class="nav-btn active" onclick="showPage(1, this)">📥 GİRİŞ</button>
        <button class="nav-btn" onclick="showPage(2, this)">📜 GEÇMİŞ</button>
        <button class="nav-btn" onclick="showPage(3, this)">📊 RAPOR</button>
        <button class="nav-btn" onclick="showPage(4, this)">⚙️ AYARLAR</button>
    </div>

    <div id="p1" class="page active">
        <div class="card">
            <h2 style="font-size:1.1rem; margin-bottom:15px">🚀 Operasyon Girişi</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px">
                <div class="input-group" style="grid-column: span 2;"><label>📅 Tarih</label><input type="date" id="tarih"></div>
                <div class="input-group"><label>📦 Görev</label><input type="number" id="gorev" placeholder="0" inputmode="numeric"></div>
                <div class="input-group"><label>🎁 Parça</label><input type="number" id="parca" placeholder="0" inputmode="numeric"></div>
                <div class="input-group"><label>🔄 Devir</label><input type="number" id="devir" placeholder="0" inputmode="numeric"></div>
                <div class="input-group"><label>📥 Toplama</label><input type="number" id="toplama" placeholder="0" inputmode="numeric"></div>
                <div class="input-group" style="grid-column: span 2;"><label>🛣️ Günlük KM</label><input type="number" id="km" placeholder="0" inputmode="numeric"></div>
            </div>
            <button class="btn btn-save" style="margin-top:20px" onclick="saveData()">KAYDET</button>
        </div>
    </div>

    <div id="p2" class="page"><div id="history-container"></div></div>

    <div id="p3" class="page">
        <div class="report-hero">
            <span style="font-size:0.8rem; font-weight:800; opacity:0.9">AYLIK NET DURUMU</span>
            <div style="font-size:2.2rem; font-weight:950; margin:5px 0" id="rep-net-display">0 G / 0 P</div>
            <div id="rep-income-total" style="font-size:1rem; opacity:0.9">Kazanç: 0 ₺</div>
            <div id="rep-extra-info" style="font-size:0.75rem; margin-top:8px; opacity:0.8">Yükleniyor...</div>
        </div>

        <div class="card">
            <h2 style="font-size:1rem; font-weight:850; margin-bottom:10px">🎯 Hedef İlerleme</h2>
            <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:800; color:var(--text-secondary)">
                <span id="prog-txt-left">0 Adet</span>
                <span id="prog-txt-right">Hedef: 0</span>
            </div>
            <div class="progress-container"><div class="progress-bar" id="bar-task"></div></div>
            <div id="target-detail" class="target-info"></div>
            <button class="btn btn-wa" style="margin-top:15px" onclick="shareMonthly()">📲 AYLIK ÖZETİ PAYLAŞ</button>
        </div>
        <h2 style="font-size:1rem; font-weight:850; margin:15px 10px">📅 Günlük Liste</h2>
        <div id="monthly-cards"></div>
    </div>

    <div id="p4" class="page">
        <div class="card">
            <h2 style="font-size:1.1rem; margin-bottom:15px">⚙️ Ayarlar</h2>
            <div class="input-group"><label>💰 Paket Başı Ücret (₺)</label><input type="number" id="cfg-ucret" onchange="updateCfg()"></div>
            <div class="input-group"><label>📦 Aylık Net Kargo Hedefi</label><input type="number" id="cfg-hedef" onchange="updateCfg()"></div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('kurye_v26_db')) || [];
    let config = JSON.parse(localStorage.getItem('kurye_v26_cfg')) || { ucret: 35, hedef: 0 };
    
    document.getElementById('tarih').valueAsDate = new Date();
    document.getElementById('cfg-ucret').value = config.ucret;
    document.getElementById('cfg-hedef').value = config.hedef;

    function showPage(num, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p' + num).classList.add('active');
        btn.classList.add('active');
        if(num === 2) renderHistory();
        if(num === 3) renderMonthly();
    }

    function updateCfg() {
        config.ucret = parseFloat(document.getElementById('cfg-ucret').value) || 0;
        config.hedef = parseFloat(document.getElementById('cfg-hedef').value) || 0;
        localStorage.setItem('kurye_v26_cfg', JSON.stringify(config));
    }

    function saveData() {
        const d = (id) => parseFloat(document.getElementById(id).value) || 0;
        db.unshift({
            tarih: document.getElementById('tarih').value,
            gorev: d('gorev'), devir: d('devir'), parca: d('parca'), toplama: d('toplama'), km: d('km')
        });
        localStorage.setItem('kurye_v26_db', JSON.stringify(db));
        alert("✅ Veri Kaydedildi!");
        
        // Girişleri Temizle
        ['gorev', 'parca', 'devir', 'toplama', 'km'].forEach(id => document.getElementById(id).value = '');
    }

    function renderHistory() {
        const cont = document.getElementById('history-container');
        cont.innerHTML = db.map((x, i) => `
            <div class="smart-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                    <strong>📅 ${x.tarih.split('-').reverse().join('.')}</strong>
                    <div style="display:flex; gap:15px">
                        <span onclick="shareDaily(${i})" style="font-size:1.3rem; cursor:pointer">📤</span>
                        <span onclick="db.splice(${i},1); localStorage.setItem('kurye_v26_db', JSON.stringify(db)); renderHistory();" style="color:var(--danger); cursor:pointer">🗑️</span>
                    </div>
                </div>
                <div class="sc-grid">
                    <div class="sc-box"><span>NET G.</span><strong>${x.gorev - x.devir}</strong></div>
                    <div class="sc-box"><span>NET P.</span><strong>${x.parca - x.devir}</strong></div>
                    <div class="sc-box"><span>TOPLAMA</span><strong>${x.toplama}</strong></div>
                    <div class="sc-box"><span>KM</span><strong>${x.km}</strong></div>
                </div>
            </div>
        `).join('');
    }

    function renderMonthly() {
        const now = new Date();
        const m = db.filter(x => new Date(x.tarih).getMonth() === now.getMonth());
        let g=0, d=0, p=0, t=0;
        m.forEach(x => { g+=x.gorev; d+=x.devir; p+=x.parca; t+=x.toplama; });
        const netG = g-d;
        document.getElementById('rep-net-display').innerText = `${netG} G / ${p-d} P`;
        document.getElementById('rep-income-total').innerText = `Kazanç: ${(netG * config.ucret).toLocaleString()} ₺`;
        document.getElementById('rep-extra-info').innerText = `Brüt: ${g} | Devir: ${d} | Toplama: ${t}`;
        document.getElementById('prog-txt-left').innerText = netG + " Adet";
        document.getElementById('prog-txt-right').innerText = "Hedef: " + config.hedef;

        if(config.hedef > 0) {
            const perc = Math.min((netG / config.hedef) * 100, 100);
            document.getElementById('bar-task').style.width = perc + "%";
            const aySonu = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const kalanGun = Math.max(aySonu - now.getDate(), 1);
            document.getElementById('target-detail').innerHTML = `📉 Kalan Kargo: <b>${Math.max(config.hedef - netG, 0)} Adet</b><br>📍 Günlük Alman Gereken: <b>${Math.ceil(Math.max(config.hedef - netG, 0)/kalanGun)} Adet</b>`;
        }

        const cards = document.getElementById('monthly-cards');
        cards.innerHTML = m.map(x => `
            <div class="smart-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px"><strong>📅 ${x.tarih.split('-').reverse().join('.')}</strong></div>
                <div class="sc-grid">
                    <div class="sc-box"><span>NET G.</span><strong>${x.gorev-x.devir}</strong></div>
                    <div class="sc-box"><span>NET P.</span><strong>${x.parca-x.devir}</strong></div>
                    <div class="sc-box"><span>TOPLAMA</span><strong>${x.toplama}</strong></div>
                    <div class="sc-box"><span>KM</span><strong>${x.km}</strong></div>
                </div>
            </div>
        `).join('');
    }

    function shareDaily(i) {
        const x = db[i];
        const nG = x.gorev - x.devir;
        const text = `📅 *Tarih:* ${x.tarih.split('-').reverse().join('.')}\n━━━━━━━━━━━━━━━━━━\n📦 *BRÜT VERİLER*\n┣ 📥 Görev: ${x.gorev}\n┣ 🔄 Devir: ${x.devir}\n┗ 📤 Toplama: ${x.toplama}\n━━━━━━━━━━━━━━━━━━\n✅ *NET TESLİMATLAR*\n┣ 🎯 Net Görev: *${nG} Adet*\n┣ 💎 Net Parça: *${x.parca - x.devir} Adet*\n┣ 🏗️ Net Toplama: *${x.toplama} Adet*\n┗ 🛣️ KM: *${x.km}*\n━━━━━━━━━━━━━━━━━━`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function shareMonthly() {
        const m = db.filter(x => new Date(x.tarih).getMonth() === new Date().getMonth());
        let gT=0, pT=0, tT=0, dT=0, kmT=0;
        let liste = `📊 *AYLIK GENEL ÖZET* 📊\n━━━━━━━━━━━━━━━━━━\n\n`;
        m.slice().reverse().forEach(x => {
            const nG = x.gorev - x.devir;
            const nP = x.parca - x.devir;
            gT += nG; pT += nP; tT += x.toplama; dT += x.devir; kmT += x.km;
            liste += `📅 *${x.tarih.split('-').reverse().join('.')}*\n• Görev: ${x.gorev} | Parça: ${x.parca}\n• Toplama: ${x.toplama} | Devir: ${x.devir}\n• *Net Görev:* ${nG} | *Net Parça:* ${nP}\n• KM: ${x.km}\n──────────────────\n`;
        });
        liste += `\n🏆 *GENEL TOPLAM NET*\n┣ ✅ Net Görev: *${gT}*\n┣ 📦 Net Parça: *${pT}*\n┣ 🏗️ Net Toplama: *${tT}*\n┣ 🔄 Toplam Devir: *${dT}*\n┣ 🛣️ Toplam KM: *${kmT}*\n━━━━━━━━━━━━━━━━━━\n🎯 *HEDEF:* ${config.hedef}\n🏁 *İLERLEME:* %${Math.round((gT/config.hedef)*100) || 0}\n━━━━━━━━━━━━━━━━━━`;
        window.open(`https://wa.me/?text=${encodeURIComponent(liste)}`);
    }
</script>
</body>
</html>
