<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurye Operasyon Merkezi PRO</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --accent-color: #3b82f6;
            --accent-light: #eff6ff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --whatsapp: #25d366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-primary); padding: 15px; line-height: 1.5; padding-bottom: 30px; }
        .container { max-width: 600px; margin: 0 auto; }

        .nav-bar { display: flex; background: var(--card-bg); border-radius: 16px; padding: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); gap: 5px; }
        .nav-btn { flex: 1; padding: 14px 5px; border: none; background: transparent; color: var(--text-secondary); font-weight: 600; font-size: 13px; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .nav-btn.active { background: var(--accent-light); color: var(--accent-color); box-shadow: inset 0 0 0 1px var(--accent-color); }

        .page { display: none; animation: slideUp 0.3s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        h2 { font-size: 1.15rem; margin-bottom: 20px; color: var(--text-primary); border-bottom: 2px solid var(--bg-color); padding-bottom: 12px; }

        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        .input-box { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
        input { background: var(--bg-color); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: var(--text-primary); font-size: 1.05rem; outline: none; transition: 0.2s; width: 100%; }
        input:focus { border-color: var(--accent-color); background: #fff; box-shadow: 0 0 0 4px var(--accent-light); }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 1.05rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn-save { background: var(--accent-color); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-secondary); font-size: 0.95rem; }
        .btn-wa-big { background: var(--whatsapp); color: white; margin-top: 20px; }

        .smart-card { background: #fff; border-radius: 16px; border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03); }
        .sc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px dashed var(--border); padding-bottom: 10px; }
        .sc-date { font-weight: 700; color: var(--text-primary); font-size: 1.1rem; }
        .sc-actions { display: flex; gap: 8px; align-items: center; }
        .sc-wa-btn { background: var(--whatsapp); color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; padding: 5px; line-height: 1; }
        
        .sc-body { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center; margin-bottom: 12px; }
        .sc-stat { display: flex; flex-direction: column; gap: 4px; background: var(--bg-color); padding: 8px 4px; border-radius: 10px; }
        .sc-stat span { font-size: 0.75rem; color: var(--text-secondary); font-weight: 500; }
        .sc-stat strong { font-size: 1.05rem; color: var(--accent-color); }

        .sc-net { background: var(--accent-light); padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; border: 1px dashed var(--accent-color); }
        .sc-net span { font-size: 0.9rem; color: var(--accent-color); font-weight: 700; }
        
        .sc-finance { display: flex; justify-content: space-between; background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.9rem; font-weight: 600; }
        .sc-income { color: var(--success); }
        .sc-expense { color: var(--danger); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item { background: var(--bg-color); padding: 16px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 1.4rem; font-weight: 800; display: block; color: var(--accent-color); margin-top: 5px; }

        @media (max-width: 480px) {
            .grid-input { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .sc-body { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <button class="nav-btn active" onclick="showPage(1, this)">VERİ GİRİŞİ</button>
        <button class="nav-btn" onclick="showPage(2, this)">GEÇMİŞ</button>
        <button class="nav-btn" onclick="showPage(3, this)">RAPOR & YEDEK</button>
    </div>

    <div id="p1" class="page active">
        <div class="card">
            <h2>Yeni Gün Kaydı</h2>
            <div class="grid-input">
                <div class="input-box full-width"><label>Tarih</label><input type="date" id="tarih"></div>
                <div class="input-box"><label>Görev Sayısı</label><input type="number" id="gorev" placeholder="0"></div>
                <div class="input-box"><label>Parça Sayısı</label><input type="number" id="parca" placeholder="0"></div>
                <div class="input-box"><label>Toplama</label><input type="number" id="toplama" placeholder="0"></div>
                <div class="input-box"><label>Devir</label><input type="number" id="devir" placeholder="0"></div>
                <div class="input-box"><label>Günlük KM</label><input type="number" id="km" placeholder="0"></div>
                <div class="input-box"><label>Günlük Gider (₺)</label><input type="number" id="gider" placeholder="0"></div>
            </div>
            <button class="btn btn-save" onclick="saveData()">SİSTEME İŞLE</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="card" style="padding-bottom: 10px;">
            <h2 style="border: none; margin-bottom: 5px;">Kayıtları Filtrele</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="month" id="filter-month" onchange="renderHistoryCards()" style="flex: 1;">
                <button class="btn btn-outline" style="width: auto; margin-top: 0; padding: 0 20px;" onclick="resetFilter()">Tümü</button>
            </div>
        </div>
        <div id="smart-cards-container"></div>
    </div>

    <div id="p3" class="page">
        <div class="card">
            <h2>Finansal Özet (Bu Ay)</h2>
            <div class="stat-grid">
                <div class="stat-item full-width" style="background:#f0fdf4; border-color:#86efac;">
                    <label>Aylık Toplam Gelir</label>
                    <span id="mon-gelir" class="stat-val" style="color:var(--success);">0 ₺</span>
                </div>
                <div class="stat-item full-width" style="background:#fef2f2; border-color:#fca5a5;">
                    <label>Aylık Toplam Gider</label>
                    <span id="mon-gider" class="stat-val" style="color:var(--danger);">0 ₺</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>İş Performansı (Bu Ay)</h2>
            <div class="stat-grid">
                <div class="stat-item"><label>Toplam Görev</label><span id="mon-gorev" class="stat-val">0</span></div>
                <div class="stat-item"><label>Toplam Parça</label><span id="mon-parca" class="stat-val">0</span></div>
                <div class="stat-item"><label>Toplama</label><span id="mon-toplama" class="stat-val">0</span></div>
                <div class="stat-item"><label>Devir</label><span id="mon-devir" class="stat-val" style="color:var(--warning);">0</span></div>
                <div class="stat-item full-width" style="background:var(--accent-light); border-color:var(--accent-color);">
                    <label>🏆 NET TESLİMAT</label>
                    <span id="mon-net" class="stat-val" style="font-size:1.1rem;">0 Görev / 0 Parça</span>
                </div>
                <div class="stat-item full-width"><label>Toplam Mesafe</label><span id="mon-km" class="stat-val" style="color:var(--text-primary); font-size:1.1rem;">0 KM</span></div>
            </div>
            <button class="btn btn-wa-big" onclick="shareMonthlyReport()">📊 Aylık Raporu WhatsApp'la Paylaş</button>
        </div>

        <div class="card">
            <h2>Veri Güvenliği</h2>
            <button class="btn btn-outline" onclick="exportData()">💾 Yedeği Telefona İndir</button>
            <div style="margin-top:20px; border-top: 1px solid var(--border); padding-top: 15px;">
                <label style="font-size:0.8rem; display: block; margin-bottom: 8px;">Dışarıdan Yedek Yükle:</label>
                <input type="file" id="importFile" onchange="importData()" style="padding:10px; font-size: 0.9rem; width: 100%;">
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('kuryegunluk_data_pro')) || [];
    document.getElementById('tarih').valueAsDate = new Date();

    function showPage(num, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p' + num).classList.add('active');
        btn.classList.add('active');
        
        if(num === 2) renderHistoryCards();
        if(num === 3) updateMonthlyStats();
    }

    function saveData() {
        const tarihVal = document.getElementById('tarih').value;
        if(!tarihVal) { alert("Lütfen tarih seçin!"); return; }

        const gorevSayisi = parseInt(document.getElementById('gorev').value) || 0;
        const parcaSayisi = parseInt(document.getElementById('parca').value) || 0;
        const devirSayisi = parseInt(document.getElementById('devir').value) || 0;
        
        const netGorevForIncome = Math.max(0, gorevSayisi - devirSayisi);
        
        const entry = {
            tarih: tarihVal,
            gorev: gorevSayisi,
            parca: parcaSayisi,
            devir: devirSayisi,
            gelir: netGorevForIncome * 30,
            toplama: parseInt(document.getElementById('toplama').value) || 0,
            km: parseInt(document.getElementById('km').value) || 0,
            gider: parseFloat(document.getElementById('gider').value) || 0
        };

        const idx = db.findIndex(x => x.tarih === entry.tarih);
        if(idx > -1) {
            if(!confirm("Bu tarihte kayıt var. Güncellensin mi?")) return;
            db[idx] = entry; 
        } else {
            db.push(entry);
        }
        
        db.sort((a,b) => new Date(b.tarih) - new Date(a.tarih));
        saveToLocalStorage();
        
        ['gorev', 'parca', 'toplama', 'devir', 'km', 'gider'].forEach(id => { document.getElementById(id).value = ''; });
        alert("Başarıyla kaydedildi!");
    }

    function deleteEntry(tarih) {
        if(confirm(tarih.split('-').reverse().join('.') + " tarihli kaydı silmek istediğinize emin misiniz?")) {
            db = db.filter(x => x.tarih !== tarih);
            saveToLocalStorage();
            renderHistoryCards();
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem('kuryegunluk_data_pro', JSON.stringify(db));
    }

    function renderHistoryCards() {
        const container = document.getElementById('smart-cards-container');
        const filter = document.getElementById('filter-month').value;
        container.innerHTML = '';

        const filteredDb = db.filter(x => !filter || x.tarih.startsWith(filter));

        if(filteredDb.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:#64748b; padding:20px;">Kayıt bulunamadı.</div>`;
            return;
        }

        filteredDb.forEach(x => {
            const tarihFormat = x.tarih.split('-').reverse().join('.');
            const netGorev = Math.max(0, x.gorev - x.devir);
            const netParca = Math.max(0, x.parca - x.devir);
            
            const cardHTML = `
                <div class="smart-card">
                    <div class="sc-header">
                        <div class="sc-date">📅 ${tarihFormat}</div>
                        <div class="sc-actions">
                            <button class="btn-del" onclick="deleteEntry('${x.tarih}')">🗑️</button>
                            <button class="sc-wa-btn" onclick="shareDayCard('${x.tarih}')">Gönder</button>
                        </div>
                    </div>
                    <div class="sc-body">
                        <div class="sc-stat"><span>Görev</span><strong>${x.gorev}</strong></div>
                        <div class="sc-stat"><span>Parça</span><strong>${x.parca}</strong></div>
                        <div class="sc-stat"><span>Toplama</span><strong>${x.toplama}</strong></div>
                        <div class="sc-stat"><span>Devir</span><strong>${x.devir}</strong></div>
                    </div>
                    <div class="sc-net">
                        <span>🏆 Net: ${netGorev} Görev | ${netParca} Parça</span>
                    </div>
                    <div class="sc-finance">
                        <span class="sc-income">💰 Gelir: ${x.gelir} ₺</span>
                        <span class="sc-expense">📉 Gider: ${x.gider} ₺</span>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    function resetFilter() { document.getElementById('filter-month').value = ''; renderHistoryCards(); }

    function updateMonthlyStats() {
        const now = new Date();
        const curM = now.getMonth();
        const curY = now.getFullYear();
        let sGorev = 0, sParca = 0, sToplama = 0, sDevir = 0, sKm = 0, sGelir = 0, sGider = 0;
        
        db.forEach(x => {
            const d = new Date(x.tarih);
            if(d.getMonth() === curM && d.getFullYear() === curY) {
                sGorev += x.gorev; sParca += x.parca; sToplama += x.toplama; 
                sDevir += x.devir; sKm += x.km; sGelir += (x.gelir || 0); sGider += (x.gider || 0);
            }
        });
        
        const netG = Math.max(0, sGorev - sDevir);
        const netP = Math.max(0, sParca - sDevir);

        document.getElementById('mon-gorev').innerText = sGorev;
        document.getElementById('mon-parca').innerText = sParca;
        document.getElementById('mon-toplama').innerText = sToplama;
        document.getElementById('mon-devir').innerText = sDevir;
        document.getElementById('mon-km').innerText = sKm + " KM";
        document.getElementById('mon-gelir').innerText = sGelir.toLocaleString() + " ₺";
        document.getElementById('mon-gider').innerText = sGider.toLocaleString() + " ₺";
        document.getElementById('mon-net').innerText = `${netG} Görev / ${netP} Parça`;
    }

    function shareDayCard(tarih) {
        const veri = db.find(x => x.tarih === tarih);
        if(!veri) return;
        const tarihFormat = veri.tarih.split('-').reverse().join('.');
        const netG = Math.max(0, veri.gorev - veri.devir);
        const netP = Math.max(0, veri.parca - veri.devir);
        const mesaj = `🚀 *Kurye Günlük Özet* (${tarihFormat})\n\n` +
                      `✅ Görev: ${veri.gorev}\n📦 Parça: ${veri.parca}\n📥 Toplama: ${veri.toplama}\n🔄 Devir: ${veri.devir}\n🛣️ KM: ${veri.km}\n\n` +
                      `🏆 *NET:* ${netG} Görev / ${netP} Parça\n\n` +
                      `💰 *Gelir:* ${veri.gelir} ₺\n📉 *Gider:* ${veri.gider} ₺`;
        window.open(`https://wa.me/?text=${encodeURIComponent(mesaj)}`, '_blank');
    }

    function shareMonthlyReport() {
        const now = new Date();
        const ayIsmi = now.toLocaleString('tr-TR', { month: 'long', year: 'numeric' });
        
        const sGorev = document.getElementById('mon-gorev').innerText;
        const sParca = document.getElementById('mon-parca').innerText;
        const sToplama = document.getElementById('mon-toplama').innerText;
        const sDevir = document.getElementById('mon-devir').innerText;
        const sNet = document.getElementById('mon-net').innerText;
        const sKm = document.getElementById('mon-km').innerText;
        const sGelir = document.getElementById('mon-gelir').innerText;
        const sGider = document.getElementById('mon-gider').innerText;

        const mesaj = `📊 *${ayIsmi.toUpperCase()} OPERASYON RAPORU*\n\n` +
                      `📈 *İş Hacmi*\n` +
                      `• Toplam Görev: ${sGorev}\n` +
                      `• Toplam Parça: ${sParca}\n` +
                      `• Toplam Toplama: ${sToplama}\n` +
                      `• Toplam Devir: ${sDevir}\n\n` +
                      `🏆 *NET TESLİMAT:* ${sNet}\n\n` +
                      `💰 *Finansal Özet*\n` +
                      `• Toplam Gelir: ${sGelir}\n` +
                      `• Toplam Gider: ${sGider}\n\n` +
                      `🛣️ *Toplam Mesafe:* ${sKm}`;
        
        window.open(`https://wa.me/?text=${encodeURIComponent(mesaj)}`, '_blank');
    }

    function exportData() {
        const dataStr = JSON.stringify(db);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', `kurye_yedek_${new Date().toLocaleDateString()}.json`);
        linkElement.click();
    }

    function importData() {
        const file = document.getElementById('importFile').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if(confirm("Mevcut veriler silinip yedek yüklensin mi?")) {
                    db = imported;
                    saveToLocalStorage();
                    location.reload();
                }
            } catch(err) { alert("Dosya okunamadı!"); }
        };
        reader.readAsText(file);
    }
</script>

</body>
</html>
